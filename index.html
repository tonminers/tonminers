<!DOCTYPE html>
<html lang="en">
  <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Ton Miners</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css?37">
    <link rel="icon" href="./favicon.png" type="image/x-icon">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

  </head>
  <body>

    <main>
      <div class="container">

        <div class="header mt-3">
          <div class="row">
            <div class="col">
              <img src="./icon-transparent.png" alt="" class="icon ms-2">
            </div>
            <div class="col position-relative">
              <div class="text-end position-absolute top-50 end-0 translate-middle">
                <span class="welcome"><small>Hello, <strong><span id="first_name" class="name"></span></strong>!</small></span>
              </div>
            </div>
          </div>
        </div>

        <div id="screen_home">

          <div class="row pb-3 pt-4">
            <h1 class="text-center mb-0 text" id="earnings">0.0</h1>
            <h6 class="text-center mt-0 text">TON</h6>
          </div>
  
          <div class="miner pb-2">
            <img src="./miner.gif" alt="">
          </div>
  
          <div class="row mt-3">
            <div class="col d-grid pe-0"><button type="button" class="btn btn-tg">⚪️ <small>Compound</small></button></div>
            <div class="col d-grid"><button type="button" class="btn btn-tg" onclick="app.openScreen('settings');">⚪️ <small>Withdraw</small></button></div>
          </div>
  
          <div class="mt-4">
            <p class="text mb-1"><small>
              <strong>Your Referral Link</strong><br>
              <span class="link-custom" onclick="app.copyLink();" id="refLink">t.me/TonMinersRobot?start=code</span><br>
              <span class="text-success" id="refLinkSuccess" style="display: none;"><small>Link successfully copied.</small></span>
            </small></p>
            <p class="text"><small>
              <strong>TMU</strong> (TON Mining Units)<br>
              <span class="text2" id="tmu">0.0</span>
            </small></p>
          </div>
  
          <div class="mt-4 row mb-2">
            <div class="col d-grid pe-0"><button type="button" class="btn btn-success" onclick="app.openScreen('new');"><i class="fa fa-plus-circle" aria-hidden="true"></i>&nbsp;&nbsp;<small>New TMU</small></button></div>
            <div class="col d-grid"><button type="button" class="btn btn-danger" onclick="app.openScreen('cancel');"><i class="fa fa-minus-circle" aria-hidden="true"></i>&nbsp;&nbsp;<small>Cancel TMU</small></button></div>
          </div>

        </div>

        <div id="screen_new" class="hidden section mt-4">
          <div class="row p-3">
            <div class="text-center my-3">
              <i class="fa-solid fa-circle-plus section-icon"></i>
            </div>
            <label for="addressWithdraw" class="form-label text"><small>Deposit Address</small></label>
            <div class="input-group">
              <input type="text" id="addressDeposit" readonly class="form-control custom-form" placeholder="" aria-label="" aria-describedby="" value="">
              <button class="btn btn-tg" type="button" onclick="app.copyAddress();"><i class="fa-solid fa-copy"></i></button>
            </div>
            <span class="text-success mt-3" id="addressDepositSuccess" style="display: none; font-size: small;">Address successfully copied.</span>
            <div class="d-grid mt-3">
              <button type="button" class="btn btn-tg"><small><i class="fa-solid fa-check-double"></i>&nbsp;&nbsp;Payment Confirmed</small></button>
            </div>
          </div>
        </div>

        <div id="screen_cancel" class="hidden section mt-4">
          <div class="row p-3">
            <div class="text-center my-3">
              <i class="fa-solid fa-minus-circle section-icon"></i>
            </div>
            <div class="mt-2 mb-3">
              <p class="mb-1"><small class="text"><strong>TMU Progress</strong></small></p>
              <div class="progress progress-custom" role="progressbar" aria-label="Basic example" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
                <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 25%"></div>
              </div>
            </div>
            <p class="text"><small><strong>dfsfdsafdsa</strong><br>
            fdafdsfsda</small></p>
            <p class="text"><small><strong>dfsfdsafdsa</strong><br>
              fdafdsfsda</small></p>
            <div class="d-grid">
              <button type="button" class="btn btn-danger"><small><i class="fa-solid fa-minus-circle"></i>&nbsp;&nbsp;Cancel TMU</small></button>
            </div>
          </div>
        </div>

        <div id="screen_settings" class="hidden section mt-4">
          <div class="row p-3">
            <div class="text-center my-3">
              <i class="fa-solid fa-gear section-icon"></i>
            </div>
            <div class="mb-3">
              <label for="addressWithdraw" class="form-label text"><small>Withdraw Address</small></label>
              <input type="text" class="form-control custom-form" id="addressWithdraw" placeholder="">
            </div>
            <div class="d-grid">
              <button type="button" class="btn btn-tg"><small><i class="fa-solid fa-check-double"></i>&nbsp;&nbsp;Save</small></button>
            </div>
          </div>
        </div>

      </div>
    </main>

    <input type="text" id="copy" style="display: none;">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="./index.js?25"></script>

  </body>
</html>
