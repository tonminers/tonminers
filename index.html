<!DOCTYPE html>
<html lang="en">
  <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Ton Miners</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css?30">
    <link rel="icon" href="./favicon.png" type="image/x-icon">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

  </head>
  <body>

    <main>
      <div class="container">

        <div class="header mt-3">
          <div class="row">
            <div class="col">
              <img src="./icon-transparent.png" alt="" class="icon ms-2">
            </div>
            <div class="col position-relative">
              <div class="text-end position-absolute top-50 end-0 translate-middle">
                <span class="welcome"><small>Hello, <strong><span id="first_name" class="name"></span></strong>!</small></span>
              </div>
            </div>
          </div>
        </div>

        <div id="screen_home">

          <div class="row pb-3 pt-4">
            <h1 class="text-center mb-0 text">10.857350382</h1>
            <h6 class="text-center mt-0 text">TON</h6>
          </div>
  
          <div class="miner pb-2">
            <img src="./miner.gif" alt="">
          </div>
  
          <div class="row mt-3">
            <div class="col d-grid pe-0"><button type="button" class="btn btn-tg"><small>⚪️ Compound</small></button></div>
            <div class="col d-grid"><button type="button" class="btn btn-tg" onclick="app.openScreen('settings');"><small>⚪️ Withdraw</small></button></div>
          </div>
  
          <div class="mt-4">
            <p class="text mb-1"><small>
              <strong>Your Referral Link</strong><br>
              <span class="text2">t.me/TonMinersRobot?start=code</span>
            </small></p>
            <p class="text"><small>
              <strong>TMU</strong> (TON Mining Units)<br>
              <span class="text2">25.756384739</span>
            </small></p>
          </div>
  
          <div class="mt-4 row mb-2">
            <div class="col d-grid pe-0"><button type="button" class="btn btn-success" onclick="app.openScreen('new');"><i class="fa fa-plus-circle" aria-hidden="true"></i>&nbsp;&nbsp;<small>New TMU</small></button></div>
            <div class="col d-grid"><button type="button" class="btn btn-danger" onclick="app.openScreen('cancel');"><i class="fa fa-minus-circle" aria-hidden="true"></i>&nbsp;&nbsp;<small>Cancel TMU</small></button></div>
          </div>

        </div>

        <div id="screen_new" class="hidden">
          <div class="row pt-4">
            <small class="text">Screen New</small>
          </div>
        </div>

        <div id="screen_cancel" class="hidden">
          <div class="row pt-4">
            <small class="text">Screen Cancel</small>
          </div>
        </div>

        <div id="screen_settings" class="hidden">
          <div class="row pt-4">
            <small class="text">Screen Settings</small>
          </div>
        </div>

      </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="./index.js?16"></script>

  </body>
</html>
